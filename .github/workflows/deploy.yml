name: Deploy to GitHub Pages

# Build on every push to main and publish the Vite build to GitHub Pages.
# CI uses Node directly (the repo's Docker-only rule applies to local dev,
# not to CI runners). Manual runs are allowed via the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by actions/deploy-pages (OIDC token + Pages write).
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight deploy at a time; newer pushes supersede older runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
